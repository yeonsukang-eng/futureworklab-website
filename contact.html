<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 | 퓨쳐워크랩</title>
<link rel="stylesheet" href="common.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .contact-hero { padding: 140px 0 80px; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; }
  .contact-info h1 { font-size: 40px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
  .contact-info .desc { font-size: 16px; color: var(--n500); line-height: 1.7; margin-bottom: 40px; }
  .info-items { display: flex; flex-direction: column; gap: 24px; }
  .info-item { display: flex; gap: 16px; align-items: start; }
  .info-item .icon { width: 40px; height: 40px; border-radius: 10px; background: var(--n50); display: flex; align-items: center; justify-content: center; color: var(--n600); flex-shrink: 0; }
  .info-item .label { font-size: 13px; color: var(--n400); margin-bottom: 2px; }
  .info-item .value { font-size: 16px; font-weight: 500; }
  .info-item a { color: var(--n900); text-decoration: none; }

  .contact-form { padding: 40px; border-radius: 16px; border: 1px solid var(--n100); box-shadow: var(--shadow-100); }
  .contact-form h3 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .contact-form .form-sub { font-size: 14px; color: var(--n500); margin-bottom: 24px; }
  .contact-form .btn-solid { width: 100%; justify-content: center; padding: 14px; }

  .map-section { padding: 0 0 80px; }
  .map-placeholder {
    max-width: 1200px; margin: 0 auto; padding: 0 40px;
  }
  .map-placeholder .map {
    width: 100%; height: 320px; border-radius: 16px; background: var(--n50);
    border: 1px solid var(--n100); display: flex; align-items: center; justify-content: center;
    color: var(--n400); font-size: 14px;
  }

  @media (max-width: 768px) {
    .contact-grid { grid-template-columns: 1fr; gap: 32px; }
    .contact-info h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div id="header"></div>

<section class="contact-hero">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <p class="section-label fade-up">Contact Us</p>
        <h1 class="fade-up stagger-1">문의하기</h1>
        <p class="desc fade-up stagger-2">제조 AI 도입, 지원사업 연계, 파트너십 등 무엇이든 편하게 문의해주세요.</p>
        <div class="info-items fade-up stagger-3">
          <div class="info-item">
            <div class="icon"><i data-lucide="map-pin"></i></div>
            <div><div class="label">주소</div><div class="value">서울특별시 강남구 테헤란로 311, 1203호</div></div>
          </div>
          <div class="info-item">
            <div class="icon"><i data-lucide="mail"></i></div>
            <div><div class="label">이메일</div><div class="value"><a href="mailto:contact@futureworklab.co.kr">contact@futureworklab.co.kr</a></div></div>
          </div>
          <div class="info-item">
            <div class="icon"><i data-lucide="phone"></i></div>
            <div><div class="label">전화</div><div class="value"><a href="tel:02-6953-7103">02-6953-7103</a></div></div>
          </div>
          <div class="info-item">
            <div class="icon"><i data-lucide="clock"></i></div>
            <div><div class="label">영업시간</div><div class="value">평일 09:00 - 18:00</div></div>
          </div>
        </div>
      </div>
      <div class="contact-form fade-up stagger-2">
        <h3>일반 문의</h3>
        <p class="form-sub">영업일 1일 내 답변드립니다.</p>
        <form onsubmit="event.preventDefault(); alert('문의가 접수되었습니다!'); window.location.href='thank-you.html';">
          <div class="form-group"><label>이름</label><input type="text" class="form-input" placeholder="홍길동" required></div>
          <div class="form-group"><label>이메일</label><input type="email" class="form-input" placeholder="email@company.com" required></div>
          <div class="form-group"><label>회사명</label><input type="text" class="form-input" placeholder="회사명"></div>
          <div class="form-group"><label>업종</label><select class="form-input form-select"><option value="">업종을 선택하세요</option><option>제약/건기식</option><option>포장재/부품</option><option>식품/건기식</option><option>화장품/ODM</option><option>반도체/전자부품</option><option>자동차부품</option><option>MES/ERP/WMS/QMS</option><option>기타</option></select></div>
          <div class="form-group"><label>문의 내용</label><textarea class="form-input" placeholder="궁금한 점을 자유롭게 작성해주세요." required></textarea></div>
          <button type="submit" class="btn btn-solid">문의 보내기</button>
        </form>
      </div>
    </div>
  </div>
</section>

<section class="map-section">
  <div class="map-placeholder">
    <div class="map">서울특별시 강남구 테헤란로 311, 1203호 (아남타워)</div>
  </div>
</section>

<div id="footer"></div>

<script src="common.js"></script>
<script>
  document.getElementById('header').innerHTML = getNavHTML();
  document.getElementById('footer').innerHTML = getFooterHTML();
  initCommon('company');
  lucide.createIcons();
</script>
</body>
</html>
